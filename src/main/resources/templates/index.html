<!DOCTYPE html>
<html lang="ja-JP" xmlns:th="https://www.thymeleaf.org">

<head>
	<title>NASB1995</title>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="_csrf_header" th:content="${_csrf.headerName}">
	<meta name="_csrf_token" th:content="${_csrf.token}">
	<link rel="stylesheet" type="text/css" href="/static/bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="/static/css/index.css">
	<link rel="stylesheet" type="text/css" href="/static/css/customize.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
	<link rel="shortcut icon" type="image/x-icon" href="/static/favicon.ico">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Niconne&family=Noto+Sans+JP:wght@100..900&family=Noto+Serif+JP:wght@200..900&display=swap">
	<style>
		#indexTablehead,
		#tableBody,
		#hintDiv {
			font-family: "Noto Serif JP", serif;
			font-weight: 600;
		}

		#indexTable,
		#pageNavies {
			z-index: 1;
		}

		a.effect-shine {
			font-family: "Niconne", serif;
		}

		.navbar {
			background-color: #000000 !important;
		}

		.tr-porcelain {
			background-color: rgba(248, 249, 250, 0.65);
			/* 薄い白 + 透明 */
			backdrop-filter: blur(12px);
			/* 磨りガラス効果の核心 */
			-webkit-backdrop-filter: blur(12px);
			/* Safari対応 */
			border: 1px solid rgba(255, 255, 255, 0.6);
			/* ガラスの縁 */
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
			/* 微かな浮遊感 */
			transition: all 0.3s ease;
		}

		.tr-porcelain:hover {
			background-color: rgba(248, 249, 250, 0.75);
			backdrop-filter: blur(16px);
			box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
		}

		.tr-glass {
			background: rgba(255, 255, 255, 0.33) !important;
			backdrop-filter: blur(20px) saturate(180%) !important;
			-webkit-backdrop-filter: blur(20px) saturate(180%) !important;
			border: 1px solid rgba(255, 255, 255, 0.45) !important;
			box-shadow:
				0 8px 32px rgba(0, 0, 0, 0.12),
				inset 0 1px 0 rgba(255, 255, 255, 0.8) !important;
			transition: all 0.33s ease !important;
			position: relative;
			z-index: 1;
		}

		.tr-glass:hover {
			background: rgba(255, 255, 255, 0.42) !important;
			backdrop-filter: blur(24px) saturate(200%) !important;
			box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
		}

		/* Bootstrapのtable上書き対策 */
		table.table .tr-glass td {
			background: transparent !important;
		}

		/* table-danger用のガラス調整（赤みが残るように） */
		.tr-glass.table-danger,
		.table-danger.tr-glass {
			background: rgba(128, 0, 32, 0.42) !important;
			/* 赤のベースを少し残す */
		}

		.tr-glass.table-success,
		.table-success.tr-glass {
			background: rgba(13, 92, 51, 0.42) !important;
			/* 赤のベースを少し残す */
		}

		.tr-glass.table-warning,
		.table-warning.tr-glass {
			background: rgba(246, 201, 28, 0.42) !important;
			/* 赤のベースを少し残す */
		}


		/* 特に色付き行（赤・緑など）でも白くする 
		.table-danger.tr-glass .link-btn,
		.table-success.tr-glass .link-btn,
		.table-warning.tr-glass .link-btn,
		.table-danger.tr-glass .score-download-btn,
		.table-success.tr-glass .score-download-btn,
		.table-warning.tr-glass .score-download-btn {
			color: #ffffff !important;
			text-shadow: 0 1px 3px rgba(0, 0, 0, 0.66) !important;
			transition: color 0.2s ease;
		}

		.table-danger.tr-glass .link-btn:hover,
		.table-success.tr-glass .link-btn:hover,
		.table-warning.tr-glass .link-btn:hover,
		.table-danger.tr-glass .score-download-btn:hover,
		.table-success.tr-glass .score-download-btn:hover,
		.table-warning.tr-glass .score-download-btn:hover {
			color: #f0f0f0 !important;
			text-decoration: underline;
		} */

		.tr-glass .link-btn,
		.tr-glass .score-download-btn {
			color: #ffffff !important;
			text-shadow: 0 1px 3px rgba(0, 0, 0, 0.66) !important;
			transition: color 0.2s ease;
		}

		.tr-glass .link-btn:hover,
		.tr-glass .score-download-btn:hover {
			color: #f0f0f0 !important;
			text-decoration: underline;
		}
	</style>
	<script type="text/javascript" th:src="@{/static/bootstrap/js/bootstrap.bundle.min.js}"></script>
	<script type="text/javascript" th:src="@{/static/layer/neo-layer.js}"></script>
	<script type="text/javascript" th:src="@{/static/customizes/constants.js}"></script>
	<script type="text/javascript" th:src="'https://cdn.jsdelivr.net/npm/sweetalert2@11'"></script>
</head>

<body>
	<nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top" data-bs-theme="dark">
		<div class="container-fluid">
			<div class="d-flex justify-content-start">
				<img th:src="@{/static/image/cross.svg}" alt="img01" width="60" height="60">
				<a class="navbar-brand effect-shine" style="font-size: 33px;" th:href="@{/home/index}">
					NASB1995
				</a>
			</div>
			<div class="d-flex justify-content-end">
				<a th:href="@{/home/to-login}" type="button" class="btn btn-primary me-2" style="font-weight: 600;">
					<i class="fa-solid fa-right-to-bracket"></i> ログイン
				</a>
			</div>
		</div>
	</nav>
	<input type="hidden" th:value="${torokuMsg eq null ? '' : torokuMsg}" id="torokuMsgContainer">
	<div class="col-sm-6 offset-sm-3 col-md-8 offset-md-2 main">
		<div class="card border-darkgreen" style="margin-top: 2.2rem;">
			<div class="card-header text-bg-darkgreen mb-3">
				<h5 class="card-title" style="padding-top: 8px;font-weight: 500;">
					<i class="fa-solid fa-cross"></i> 賛美歌選択
				</h5>
			</div>
			<div class="card-body">
				<div class="row">
					<form class="form-inline col-md-6 offset-md-3" role="form" style="padding-right: 0px;">
						<div class="input-group col-md-6">
							<input id="keywordInput" class="form-control" type="text" placeholder="キーワードを入力してください">
							<button id="hymnSearchBtn" class="btn btn-danger my-2 my-sm-0" type="button">
								<i class="fa-solid fa-magnifying-glass"></i> 検索
							</button>
						</div>
					</form>
					<!-- <div class="col-md-3" style="padding-left: 0px;">
						<button type="button" class="btn btn-primary me-2" id="randomSearchBtn">
							<i class="fa-solid fa-circle-info"></i>
						</button>
				</div> -->
				</div>
				<div class="background" id="loadingBackground" style="display: none;">
					<div class="circle" id="loadingContainer" style="display: none;">
						<div class="large">
							<div class="medium">
								<div class="small">
									<div class="core"></div>
								</div>
							</div>
						</div>
						<h1>LOADING</h1>
					</div>
				</div>
				<table class="table table-sm table-hover" id="indexTable">
					<thead id="indexTablehead">
						<tr class="table-success">
							<th scope="col" class="text-center" style="width: 70%;">名称</th>
							<th scope="col" class="text-center" style="width: 30%;">楽譜</th>
						</tr>
					</thead>
					<tbody id="tableBody" class="table-group-divider"></tbody>
				</table>
				<div class="row" id="pageNavies">
					<div id="pageInfos" class="col-md-5" style="font-size: 12px;"></div>
					<div id="pageNavi" class="col-md-7 d-flex justify-content-end"></div>
				</div>
			</div>
		</div>
		<div class="row" id="hintDiv">
			<p style="font-size: 11px;color: #FFF;"
				th:text="'※韓国語単語で検索してください。'" />
		</div>
	</div>
	<script type="text/javascript" th:src="@{/static/customizes/index.js}"></script>
</body>

</html>
