server:
   forward-headers-strategy: framework
   port: 8277
   compression:
      enabled: true
      min-response-size: 1024
   tomcat:
      max-keep-alive-requests: 1000
      keep-alive-timeout: 30s
      threads:
         max: 128
      accept-count: 1000
spring:
   application:
      name: nasb1995edv4
   servlet:
      multipart:
         max-file-size: 30MB
         max-request-size: 30MB
         file-size-threshold: 1MB
   datasource:
      driver-class-name: oracle.jdbc.OracleDriver
      url: jdbc:oracle:thin:@172.26.14.43:1521/XEPDB1
      username: nasb1995
      password: nasb1995
      hikari:
         connection-init-sql: 'ALTER SESSION SET CURRENT_SCHEMA = NASB1995'
         maximum-pool-size: 40
         minimum-idle: 10
         connection-timeout: 30000
         max-lifetime: 1200000
         leak-detection-threshold: 20000
