server:
   forward-headers-strategy: framework
   port: 8277
   compression:
      enabled: true
      min-response-size: 1024
   tomcat:
      max-keep-alive-requests: 1000
      keep-alive-timeout: 30s
      threads:
         max: 128
      accept-count: 1000
spring:
   application:
      name: nasb1995edv4
   servlet:
      multipart:
         max-file-size: 20MB
         max-request-size: 25MB
   datasource:
      hikari:
         maximum-pool-size: 40
         minimum-idle: 10
         connection-timeout: 30000
         max-lifetime: 1200000
         leak-detection-threshold: 20000
   mvc:
      static-path-pattern: /static/**
   thymeleaf:
      cache: false
      mode: HTML
      encoding: UTF-8
      servlet:
         content-type: text/html
      prefix: classpath:/templates/
      suffix: .html
   profiles:
      active: prod
springdoc:
   api-docs:
      path: /v3/api-docs
      enabled: true
   swagger-ui:
      path: /swagger-ui.html
      enabled: true
      operationsSorter: method
      tagsSorter: alpha