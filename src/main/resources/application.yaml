server:
   forward-headers-strategy: framework
   port: 8277
   compression:
      enabled: true
      min-response-size: 1024
   tomcat:
      max-keep-alive-requests: 1000
      keep-alive-timeout: 30s
      threads:
         max: 128
      accept-count: 1000
spring:
   application:
      name: nasb1995edv4
   servlet:
      multipart:
         max-file-size: 30MB
         max-request-size: 30MB
         file-size-threshold: 1MB
   datasource:
      driver-class-name: oracle.jdbc.OracleDriver
      url: jdbc:oracle:thin:@172.26.14.43:1521/XEPDB1
      username: NASB1995
      password: nasb1995
      hikari:
         maximum-pool-size: 40
         minimum-idle: 10
         connection-timeout: 30000
         max-lifetime: 1200000
         leak-detection-threshold: 20000
   mvc:
      static-path-pattern: /static/**
   thymeleaf:
      cache: false
      mode: HTML
      encoding: UTF-8
      servlet:
         content-type: text/html
      prefix: classpath:/templates/
      suffix: .html
   profiles:
      active: prod
mybatis:
   mapper-locations: classpath:mapper/*Dao.xml
# エイリアス対象パッケージ(XMLのtypeでFQCN省略が可能になる)
# XMLマッパーファイルの配置パス
   type-aliases-package: app.preach.gospel.model
   configuration:
# スネークケース(DB列名) → キャメルケース(Javaフィールド名)の自動変換
      map-underscore-to-camel-case: true
# Oracle JDBCとの相性を考慮してNULL値パラメータのJdbcType指定
      jdbc-type-for-null: null
      lazy-loading-enabled: false
# キャッシュは無効(リアルタイム性重視のため常にDBから取得)
# N+1問題の早期発見のためlazyLoadingは無効(リアルタイム性重視のため即時ロード)
      cache-enabled: false
# SQLログ出力(開発時のデバッグ用、本番では下記のlogging設定でWARN以上に絞る)
      log-impl: org.apache.ibatis.logging.log4j2.Log4j2Impl
springdoc:
   api-docs:
      path: /v3/api-docs
      enabled: true
   swagger-ui:
      path: /swagger-ui.html
      enabled: true
      operationsSorter: method
      tagsSorter: alpha
logging:
   level:
# MyBatis SQLログ: 開発時はDEBUG、本番運用時はWARNに変更推奨
      app.preach.gospel.dao: INFO
# HikariCPの接続ログ
      com.zaxxer.hikari: WARN
# Oracle JDBCドライバのログ抑制
      oracle.jdbc: WARN